<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RAG</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="layout">

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-top">
        <span class="wordmark">RAG</span>
        <button class="new-btn" id="newSessionBtn" title="New session">+</button>
      </div>
      <nav class="session-list" id="sessionList"></nav>
    </aside>

    <div class="main">

      <!-- Topbar -->
      <header class="topbar">
        <span class="session-title" id="sessionTitle">—</span>
        <div class="topbar-right">
          <div class="field-group">
            <label class="field-label">collection</label>
            <input class="field-input mono" id="collectionInput" placeholder="chroma" />
          </div>
          <div class="field-group">
            <label class="field-label">Model</label>
            <input class="field-input mono" id="modelInput" placeholder="deepseek-r1:1.5b" style="width:160px" />
          </div>
          <button class="btn-save" id="saveConfigBtn">Save</button>
          <div class="divider"></div>
          <button class="btn-ghost" id="clearBtn">Clear</button>
        </div>
      </header>

      <div class="feed" id="feed">
        <div class="empty-state" id="emptyState">
          <p>Select a session or create one.</p>
        </div>
      </div>

      <!-- Input -->
      <div class="input-bar">
        <button class="btn-ask" id="fileBtn" type="file">
          <input type="file" id="fileInput" multiple style="display: none;" />
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2">
            <path d="M21.44 11.05L12.25 20.24a6 6 0 1 1-8.49-8.49l9.19-9.19a4 4 0 1 1 5.66 5.66L9.41 17.41a2 2 0 1 1-2.83-2.83l8.49-8.48"/>
          </svg>
      </button>
      <div id="fileList"></div>
      <input type="file" id="fileInput" hidden>

        <textarea id="queryInput" placeholder="Ask a question (Enter to send, Shift+Enter for newline)" rows="1"></textarea>
        <button class="btn-ask" id="sendBtn">Ask</button>
      </div>

    </div>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
